baseURL = 'https://antarct.qzz.io/'
locale = 'zh-cn'
title = "南极林的博客"
enableEmoji = true
theme = 'PaperMod'

[params]
  # defaultTheme = 'dark'  # 取消强制深色，改由 CSS 保证代码块始终可见
  description = "南极林的个人博客"
  author = "南极林"

  # 阅读体验
  ShowReadingTime = true
  ShowWordCount = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowToc = true
  TocOpen = false

  # 主页信息
  [params.homeInfoParams]
    Title = "你好，我是南极林"
    Content = "欢迎来到我的博客！这里记录技术、生活和思考。"

  # 社交图标
  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/antarctlin'
  [[params.socialIcons]]
    name = 'rss'
    url = 'https://antarct.qzz.io/index.xml'

[menu]
  [[menu.main]]
    identifier = 'archives'
    name = "归档"
    url = '/archives'
    weight = 10
  [[menu.main]]
    identifier = 'search'
    name = "搜索"
    url = '/search'
    weight = 20
  [[menu.main]]
    identifier = 'about'
    name = "关于"
    url = '/about'
    weight = 30
